<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VOTAÇÃO</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            text-transform: uppercase;
            color: #333;
            font-size: 3rem;
            margin-bottom: 30px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .options {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .card {
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
            padding: 10px;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.1);
            border-color: #ddd;
        }

        .card img {
            width: 150px;
            height: 150px;
            object-fit: contain;
        }

        .counter {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Estilo do Painel de Admin */
        #adminPanel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            border: 3px solid #333;
            padding: 30px;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            min-width: 300px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .close-btn:hover {
            background: #cc0000;
        }

        #hackerImage {
            width: 100px;
            display: block;
            margin: 0 auto 20px;
        }

        .admin-title {
            text-align: center;
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>SISTEMA DE VOTAÇÃO</h1>

    <div class="container">
        <div class="options">
            <div class="card" onclick="votar('correto')">
                <img src="like.png" alt="Correto">
                <div class="counter">Correto: <span id="countCorreto">0</span></div>
            </div>
            
            <div class="card" onclick="votar('errado')">
                <img src="6323-dislikebs.png" alt="Errado">
                <div class="counter">Errado: <span id="countErrado">0</span></div>
            </div>
        </div>
    </div>

    <!-- Painel de Admin Oculto -->
    <div id="adminPanel">
        <button class="close-btn" onclick="fecharPainel()">X</button>
        <img id="hackerImage" src="hacker options sigma.png" alt="Admin">
        <div class="admin-title">PAINEL DE ADMINISTRAÇÃO</div>
        
        <p>Total de votos computados:</p>
        <ul>
            <li>Positivos: <span id="adminCorreto">0</span></li>
            <li>Negativos: <span id="adminErrado">0</span></li>
        </ul>
        <button onclick="resetarVotos()" style="width: 100%; padding: 10px; cursor: pointer;">RESETAR DADOS</button>
    </div>

    <script>
        // Sistema de Votos
        let votos = {
            correto: 0,
            errado: 0
        };

        function votar(tipo) {
            votos[tipo]++;
            atualizarTela();
        }

        function atualizarTela() {
            document.getElementById('countCorreto').innerText = votos.correto;
            document.getElementById('countErrado').innerText = votos.errado;
            // Atualiza o painel de admin também
            document.getElementById('adminCorreto').innerText = votos.correto;
            document.getElementById('adminErrado').innerText = votos.errado;
        }

        function resetarVotos() {
            if(confirm("Deseja mesmo apagar todos os votos?")) {
                votos.correto = 0;
                votos.errado = 0;
                atualizarTela();
            }
        }

        function fecharPainel() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        // Sistema de Código Secreto "harry blocks"
        let sequence = "";
        const secretCode = "harryblocks"; // sem espaço para facilitar a detecção

        document.addEventListener('keydown', (e) => {
            // Remove espaços da entrada para evitar erros de digitação
            if(e.key === " ") return;
            
            sequence += e.key.toLowerCase();
            
            if (sequence.includes(secretCode)) {
                document.getElementById('adminPanel').style.display = 'block';
                sequence = ""; // Reseta a sequência
            }
            
            // Limpa a sequência se ficar muito grande
            if (sequence.length > 20) sequence = "";
        });
    </script>
</body>
</html>
