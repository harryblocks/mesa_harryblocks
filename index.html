<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VOTAÇÃO</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            text-transform: uppercase;
            color: #333;
            font-size: 3rem;
            margin-bottom: 30px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .options {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .card {
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
            padding: 10px;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.1);
            border-color: #ddd;
        }

        .card img {
            width: 150px;
            height: 150px;
            object-fit: contain;
        }

        .counter {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Modal de Motivos */
        #modalErro {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border: 2px solid red;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            z-index: 2000;
            text-align: center;
        }

        /* Painel de Admin */
        #adminPanel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            border: 3px solid #333;
            padding: 30px;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            min-width: 300px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .admin-title { font-weight: bold; text-decoration: underline; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <h1>SISTEMA DE VOTAÇÃO</h1>

    <div class="container">
        <div class="options">
            <div class="card" onclick="votar('correto')">
                <img src="like.png" alt="Correto">
                <div class="counter">CORRETO: <span id="countCorreto">0</span></div>
            </div>
            
            <div class="card" onclick="abrirMotivos()">
                <img src="6323-dislikebs.png" alt="Errado">
                <div class="counter">ERRADO: <span id="countErrado">0</span></div>
            </div>
        </div>
    </div>

    <div id="modalErro">
        <img src="2e82eda13b1ad2f508a6651858124034.png" style="width: 250px; margin-bottom: 10px;">
        <h3>POR QUE ESTÁ ERRADO?</h3>
        <button onclick="confirmarErro('Mesa torta')">Mesa torta</button>
        <button onclick="confirmarErro('Falta peça')">Falta peça</button>
        <button onclick="confirmarErro('Cor errada')">Cor errada</button>
    </div>

    <div id="adminPanel">
        <button class="close-btn" onclick="fecharPainel()">X</button>
        <img src="hacker options sigma.png" style="width: 80px; display: block; margin: 0 auto;">
        <div class="admin-title">PAINEL DE ADMINISTRAÇÃO</div>
        <p>Positivos: <span id="adminCorreto">0</span></p>
        <p>Negativos: <span id="adminErrado">0</span></p>
        <button onclick="resetarVotos()" style="width: 100%;">RESETAR TUDO</button>
    </div>

    <script>
        let votos = { correto: 0, errado: 0 };
        let historico = [];

        function votar(tipo) {
            votos[tipo]++;
            historico.push(tipo);
            atualizarTela();
        }

        function abrirMotivos() {
            document.getElementById('modalErro').style.display = 'block';
        }

        function confirmarErro(motivo) {
            votar('errado');
            console.log("Motivo registrado: " + motivo);
            document.getElementById('modalErro').style.display = 'none';
        }

        function atualizarTela() {
            document.getElementById('countCorreto').innerText = votos.correto;
            document.getElementById('countErrado').innerText = votos.errado;
            document.getElementById('adminCorreto').innerText = votos.correto;
            document.getElementById('adminErrado').innerText = votos.errado;
        }

        function fecharPainel() { document.getElementById('adminPanel').style.display = 'none'; }
        
        function resetarVotos() { 
            if(confirm("Zerar tudo?")) { votos = {correto:0, errado:0}; historico = []; atualizarTela(); } 
        }

        // CONTROL + Z e CÓDIGO SECRETO
        let sequence = "";
        document.addEventListener('keydown', (e) => {
            // Control + Z
            if (e.ctrlKey && e.key === 'z') {
                let ultimo = historico.pop();
                if (ultimo) {
                    votos[ultimo]--;
                    atualizarTela();
                }
            }

            // Código harryblocks
            sequence += e.key.toLowerCase();
            if (sequence.includes("harryblocks")) {
                document.getElementById('adminPanel').style.display = 'block';
                sequence = "";
            }
            if (sequence.length > 20) sequence = "";
        });
    </script>
</body>
</html>
