<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VOTAÇÃO MESA</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif; /* Fonte padrão Arial */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
        }

        h1 {
            font-family: "Times New Roman", Times, serif; /* Apenas título em Times */
            text-transform: uppercase;
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Botões de Ação Topo */
        .top-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-top {
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .btn-resultados { background-color: #007bff; }
        .btn-controlz { background-color: #ffc107; color: black; }

        /* Painel de Estatísticas Centralizado como na foto */
        .stats-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
        }

        .stats-box h2 { font-size: 1.2rem; margin-top: 0; }
        .main-stats { font-size: 1.3rem; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .sub-stats { font-size: 1rem; color: #555; }

        /* Cards de Votação Grandes */
        .voting-area {
            display: flex;
            gap: 40px;
        }

        .vote-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            width: 200px;
        }

        .vote-card:hover { transform: scale(1.05); }
        .vote-card img { width: 150px; height: 150px; object-fit: contain; }
        .vote-card p { font-weight: bold; margin-top: 15px; font-size: 1.2rem; }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 3000;
            text-align: center;
            width: 350px;
        }

        .modal h3 { margin-top: 0; }
        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .modal-buttons button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #eee;
            cursor: pointer;
            font-weight: bold;
        }
        .modal-buttons button:hover { background: #ddd; }

        /* Admin Panel */
        #adminPanel {
            background: #fff;
            border: 2px solid #333;
        }
        .close-admin {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            float: right;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>MESA - CORRETO OU ERRADO?</h1>

    <div class="top-buttons">
        <button class="btn-top btn-resultados" onclick="abrirAdmin()">📊 Resultados</button>
        <button class="btn-top btn-controlz" onclick="undo()">↩️ Control Z</button>
    </div>

    <div class="stats-box">
        <h2>Estatísticas</h2>
        <div class="main-stats">
            ✅ Sim: <span id="s-sim">0</span> | ❌ Não: <span id="s-nao">0</span>
        </div>
        <div class="sub-stats">
            Montagem: <span id="s-montagem">0</span> | Programação: <span id="s-programacao">0</span><br>
            Variação: <span id="s-variacao">0</span> | Soltagem: <span id="s-soltagem">0</span>
        </div>
    </div>

    <div class="voting-area">
        <div class="vote-card" onclick="votarSim()">
            <img src="like.png" alt="Correto">
            <p>CORRETO</p>
        </div>

        <div class="vote-card" onclick="mostrarMotivos()">
            <img src="6323-dislikebs.png" alt="Errado">
            <p>ERRADO</p>
        </div>
    </div>

    <div id="modalMotivos" class="modal">
        <img src="2e82eda13b1ad2f508a6651858124034.png" style="width: 100%; border-radius: 10px; margin-bottom: 10px;">
        <h3>QUAL O MOTIVO?</h3>
        <div class="modal-buttons">
            <button onclick="votarNao('programacao')">Programação</button>
            <button onclick="votarNao('montagem')">Montagem</button>
            <button onclick="votarNao('variacao')">Variação</button>
            <button onclick="votarNao('soltagem')">Soltagem</button>
        </div>
        <button onclick="fecharModal()" style="margin-top: 15px; background: none; border: none; color: blue; cursor: pointer;">Cancelar</button>
    </div>

    <div id="adminPanel" class="modal">
        <button class="close-admin" onclick="fecharAdmin()">SAIR</button>
        <img src="hacker options sigma.png" style="width: 60px; margin-bottom: 10px;">
        <h3>PAINEL ADMIN</h3>
        <div id="resumoAdmin" style="text-align: left; font-size: 0.9rem; margin-bottom: 15px;"></div>
        <button onclick="resetarTudo()" style="background: black; color: white; width: 100%; padding: 10px; cursor: pointer;">RESETAR DADOS</button>
    </div>

    <script>
        // Estado inicial
        let dados = {
            sim: 0,
            nao: 0,
            programacao: 0,
            montagem: 0,
            variacao: 0,
            soltagem: 0
        };

        let historico = [];

        function atualizarInterface() {
            document.getElementById('s-sim').innerText = dados.sim;
            document.getElementById('s-nao').innerText = dados.nao;
            document.getElementById('s-programacao').innerText = dados.programacao;
            document.getElementById('s-montagem').innerText = dados.montagem;
            document.getElementById('s-variacao').innerText = dados.variacao;
            document.getElementById('s-soltagem').innerText = dados.soltagem;
            
            // Atualiza texto do admin
            document.getElementById('resumoAdmin').innerHTML = `
                <b>Total Sim:</b> ${dados.sim}<br>
                <b>Total Não:</b> ${dados.nao}<br><br>
                <b>Programação:</b> ${dados.programacao}<br>
                <b>Montagem:</b> ${dados.montagem}<br>
                <b>Variação:</b> ${dados.variacao}<br>
                <b>Soltagem:</b> ${dados.soltagem}
            `;
        }

        function votarSim() {
            dados.sim++;
            historico.push('sim');
            atualizarInterface();
        }

        function mostrarMotivos() {
            document.getElementById('modalMotivos').style.display = 'block';
        }

        function votarNao(motivo) {
            dados.nao++;
            dados[motivo]++;
            historico.push(motivo);
            fecharModal();
            atualizarInterface();
        }

        function undo() {
            let ultimo = historico.pop();
            if (!ultimo) return;

            if (ultimo === 'sim') {
                dados.sim--;
            } else {
                dados.nao--;
                dados[ultimo]--;
            }
            atualizarInterface();
        }

        function fecharModal() { document.getElementById('modalMotivos').style.display = 'none'; }
        
        function abrirAdmin() { document.getElementById('adminPanel').style.display = 'block'; }
        function fecharAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        function resetarTudo() {
            if(confirm("Deseja zerar todos os votos?")) {
                dados = { sim: 0, nao: 0, programacao: 0, montagem: 0, variacao: 0, soltagem: 0 };
                historico = [];
                atualizarInterface();
            }
        }

        // Detector de código "harry blocks" e Atalhos
        let combo = "";
        document.addEventListener('keydown', (e) => {
            // Control + Z atalho
            if (e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                undo();
            }

            // Segredo "harry blocks"
            combo += e.key.toLowerCase();
            if (combo.includes("harryblocks") || combo.includes("harry blocks")) {
                abrirAdmin();
                combo = "";
            }
            if (combo.length > 20) combo = "";
        });
    </script>
</body>
</html>
