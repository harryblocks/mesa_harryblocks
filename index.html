<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">SISTEMA DE VOTAÇÃO MESA</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --hacker-green: #00ff41; }
        
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            transition: all 0.3s;
            overflow-x: hidden;
        }

        h1 {
            font-family: "Times New Roman", Times, serif;
            text-transform: uppercase;
            color: #333;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Barra de Aproveitamento (O Diferencial) */
        .progress-container {
            width: 80%;
            max-width: 500px;
            background: #ddd;
            height: 25px;
            border-radius: 50px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 2px solid #333;
        }
        #progressBar {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #28a745, #00ff41);
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stats-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
            border-left: 5px solid #007bff;
        }

        .voting-area { display: flex; gap: 40px; }

        .vote-card {
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 220px;
        }

        .vote-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .vote-card img { width: 160px; height: 160px; object-fit: contain; }

        /* PAINEL HACKER SUPREMO */
        #adminPanel { 
            background: rgba(0, 0, 0, 0.95);
            color: var(--hacker-green);
            border: 2px solid var(--hacker-green);
            font-family: 'Courier New', monospace;
            width: 500px;
            z-index: 5000;
        }

        canvas#matrix {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        /* Efeito de Tremer (Shake) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .btn-controlz { background: #ffc107; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 30px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); text-align: center; }
    </style>
</head>
<body id="mainBody">

    <h1 id="mainDisplayTitle">MESA - CORRETO OU ERRADO?</h1>
    
    <button class="btn-controlz" onclick="undo()">↩️ REVERTER ÚLTIMO VOTO (CTRL+Z)</button>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>
    <div style="font-weight: bold; margin-bottom: 20px;">Aproveitamento: <span id="percentText">0%</span></div>

    <div class="stats-box">
        <div style="font-size: 1.5rem; margin-bottom: 10px;">
            ✅ <span id="s-sim">0</span> | ❌ <span id="s-nao">0</span>
        </div>
        <div style="color: #666; font-size: 0.9rem;">
            PRG: <span id="s-programacao">0</span> | MON: <span id="s-montagem">0</span> | VAR: <span id="s-variacao">0</span> | SOL: <span id="s-soltagem">0</span>
        </div>
    </div>

    <div class="voting-area">
        <div class="vote-card" onclick="votarSim()">
            <img src="like.png">
            <p style="font-size: 1.4rem; font-weight: bold;">CORRETO</p>
        </div>
        <div class="vote-card" onclick="mostrarMotivos()">
            <img src="6323-dislikebs.png">
            <p style="font-size: 1.4rem; font-weight: bold;">ERRADO</p>
        </div>
    </div>

    <div id="modalMotivos" class="modal" style="background: white; width: 400px; color: black;">
        <img src="2e82eda13b1ad2f508a6651858124034.png" style="width: 100%; border-radius: 10px;">
        <h3 style="font-family: Arial;">REPORTAR FALHA TÉCNICA</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="votarNao('programacao')" style="padding:15px; cursor:pointer;">Programação</button>
            <button onclick="votarNao('montagem')" style="padding:15px; cursor:pointer;">Montagem</button>
            <button onclick="votarNao('variacao')" style="padding:15px; cursor:pointer;">Variação</button>
            <button onclick="votarNao('soltagem')" style="padding:15px; cursor:pointer;">Soltagem</button>
        </div>
        <button onclick="document.getElementById('modalMotivos').style.display='none'" style="margin-top:20px; border:none; background:none; color:red; cursor:pointer;">CANCELAR</button>
    </div>

    <div id="adminPanel" class="modal">
        <canvas id="matrix"></canvas>
        <button onclick="fecharAdmin()" style="float:right; background:red; color:white; border:none; cursor:pointer;">[X] CLOSE_ROOT</button>
        <h3>> DATABASE_OVERRIDE_V2</h3>
        <div style="text-align: left; padding: 10px;">
            <label>SYSTEM_LABEL:</label><br>
            <input type="text" id="newTitleInput" oninput="changeTitle(this.value)" style="width:100%; background:#111; color:var(--hacker-green); border:1px solid var(--hacker-green);"><br><br>
            <label>COLOR_HEX_CODE:</label><br>
            <input type="color" id="colorWheel" oninput="changeBgColor(this.value)" style="width:100%; cursor:pointer;">
        </div>
        <button onclick="resetarTudo()" style="width:100%; padding:10px; background:var(--hacker-green); color:black; font-weight:bold; cursor:pointer; border:none;">PURGE_ALL_DATA (Zerar)</button>
    </div>

    <script>
        let dados = JSON.parse(localStorage.getItem('mesa_dados_v2')) || { 
            sim: 0, nao: 0, programacao: 0, montagem: 0, variacao: 0, soltagem: 0,
            titulo: "MESA - CORRETO OU ERRADO?", corFundo: "#f0f0f0"
        };
        let historico = [];

        function salvar() {
            localStorage.setItem('mesa_dados_v2', JSON.stringify(dados));
            atualizar();
        }

        function atualizar() {
            document.getElementById('s-sim').innerText = dados.sim;
            document.getElementById('s-nao').innerText = dados.nao;
            document.getElementById('s-programacao').innerText = dados.programacao;
            document.getElementById('s-montagem').innerText = dados.montagem;
            document.getElementById('s-variacao').innerText = dados.variacao;
            document.getElementById('s-soltagem').innerText = dados.soltagem;
            document.getElementById('mainDisplayTitle').innerText = dados.titulo;
            document.body.style.backgroundColor = dados.corFundo;

            let total = dados.sim + dados.nao;
            let perc = total === 0 ? 0 : Math.round((dados.sim / total) * 100);
            document.getElementById('progressBar').style.width = perc + "%";
            document.getElementById('percentText').innerText = perc + "%";
        }

        function votarSim() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            dados.sim++;
            historico.push('sim');
            salvar();
        }

        function mostrarMotivos() { document.getElementById('modalMotivos').style.display = 'block'; }

        function votarNao(motivo) {
            document.body.style.animation = "shake 0.3s";
            setTimeout(() => document.body.style.animation = "", 300);
            dados.nao++;
            dados[motivo]++;
            historico.push(motivo);
            document.getElementById('modalMotivos').style.display = 'none';
            salvar();
        }

        function undo() {
            let u = historico.pop();
            if(!u) return;
            if(u === 'sim') dados.sim--; else { dados.nao--; dados[u]--; }
            salvar();
        }

        function changeTitle(v) { dados.titulo = v; salvar(); }
        function changeBgColor(v) { dados.corFundo = v; salvar(); }
        function fecharAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        function resetarTudo() { if(confirm("NUCLEAR_WIPE?")) { localStorage.clear(); location.reload(); } }

        // Código Secreto e Atalhos
        let s = "";
        document.addEventListener('keydown', (e) => {
            if(e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
            s += e.key.toLowerCase();
            if(s.includes("harryblocks") || s.includes("harry blocks")) {
                document.getElementById('adminPanel').style.display = 'block';
                startMatrix();
                s = "";
            }
        });

        // Efeito Matrix (Diferencial de Programador)
        function startMatrix() {
            const canvas = document.getElementById('matrix');
            const ctx = canvas.getContext('2d');
            canvas.width = 500; canvas.height = 400;
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            const fontSize = 10;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0F0";
                ctx.font = fontSize + "px arial";
                for(let i = 0; i < drops.length; i++) {
                    const text = letters[Math.floor(Math.random() * letters.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }

        atualizar();
    </script>
</body>
</html>
