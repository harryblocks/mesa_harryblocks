<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">SISTEMA DE VOTAÇÃO MESA</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --hacker-green: #00ff41; }
        
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            transition: all 0.3s;
            overflow-x: hidden;
        }

        h1 {
            font-family: "Times New Roman", Times, serif;
            text-transform: uppercase;
            color: #333;
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        /* Barra de Aproveitamento com Degradê Dinâmico */
        .progress-container {
            width: 80%;
            max-width: 500px;
            background: #333;
            height: 30px;
            border-radius: 50px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 3px solid #000;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        
        #progressBar {
            height: 100%;
            width: 0%;
            /* O degradê será controlado via JS para mudar de Vermelho -> Amarelo -> Verde */
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00);
            background-size: 500px 30px; 
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stats-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
        }

        .voting-area { display: flex; gap: 40px; }

        .vote-card {
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 220px;
        }

        .vote-card:hover { transform: translateY(-10px); }
        .vote-card img { width: 160px; height: 160px; object-fit: contain; }

        /* PAINEL HACKER */
        #adminPanel { 
            background: rgba(0, 0, 0, 0.98);
            color: var(--hacker-green);
            border: 2px solid var(--hacker-green);
            font-family: 'Courier New', monospace;
            width: 450px;
            z-index: 5000;
        }

        canvas#matrix {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.2;
        }

        /* Color Picker Estilo Roda Permanente */
        #colorWheel {
            width: 100%;
            height: 100px;
            cursor: pointer;
            border: 2px solid var(--hacker-green);
            background: none;
            margin-top: 10px;
        }

        /* Overlay do Vídeo Protocolo 67 */
        #videoOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            z-index: 9999;
        }
        #videoOverlay video { width: 100%; height: 100%; object-fit: contain; }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-3px, -2px); }
            100% { transform: translate(0, 0); }
        }

        .btn-adm {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 30px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

    <audio id="soundAcerto" src="acerto.mp3"></audio>
    <audio id="soundErro" src="erro.mp3"></audio>

    <div id="videoOverlay">
        <video id="vid67" src="67.mp4"></video> </div>

    <h1 id="mainDisplayTitle">MESA - CORRETO OU ERRADO?</h1>
    
    <button style="background:#ffc107; border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;" onclick="undo()">↩️ DESFAZER (CTRL+Z)</button>

    <div class="progress-container" style="margin-top:20px;">
        <div id="progressBar"></div>
    </div>
    <div style="font-weight: bold; margin-bottom: 20px;">TAXA DE SUCESSO: <span id="percentText">0%</span></div>

    <div class="stats-box">
        <div style="font-size: 1.5rem; margin-bottom: 10px;">
            ✅ <span id="s-sim">0</span> | ❌ <span id="s-nao">0</span>
        </div>
        <div style="color: #666; font-size: 0.9rem;">
            PROGRAMAÇÃO: <span id="s-programacao">0</span> | MONTAGEM: <span id="s-montagem">0</span> | VARIAÇÃO: <span id="s-variacao">0</span> | SOLTAGEM: <span id="s-soltagem">0</span>
        </div>
    </div>

    <div class="voting-area">
        <div class="vote-card" onclick="votarSim()">
            <img src="like.png">
            <p>CORRETO</p>
        </div>
        <div class="vote-card" onclick="mostrarMotivos()">
            <img src="6323-dislikebs.png">
            <p>ERRADO</p>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <canvas id="matrix"></canvas>
        <button onclick="fecharAdmin()" style="float:right; background:red; color:white; border:none; cursor:pointer; padding:5px;">SAIR</button>
        <h3>CONFIGURAÇÕES DO SISTEMA</h3>
        
        <div style="text-align: left;">
            <label>NOME DA PÁGINA:</label>
            <input type="text" id="newTitleInput" oninput="changeTitle(this.value)" style="width:95%; background:#111; color:var(--hacker-green); border:1px solid var(--hacker-green); padding:5px;">
            
            <label style="display:block; margin-top:15px;">COR DE FUNDO (SELECIONE NA RODA):</label>
            <input type="color" id="colorWheel" oninput="changeBgColor(this.value)">
        </div>

        <button onclick="executar67()" class="btn-adm" style="background:#ff4444; color:white;">ATIVAR PROTOCOLO 67</button>
        <button onclick="resetarTudo()" class="btn-adm" style="background:var(--hacker-green); color:black;">REINICIAR BANCO DE DADOS</button>
    </div>

    <div id="modalMotivos" class="modal" style="background:white; width:350px; color:black; box-shadow:0 0 20px rgba(0,0,0,0.5);">
        <h3>QUAL O MOTIVO?</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button onclick="votarNao('programacao')" style="padding:10px;">Programação</button>
            <button onclick="votarNao('montagem')" style="padding:10px;">Montagem</button>
            <button onclick="votarNao('variacao')" style="padding:10px;">Variação</button>
            <button onclick="votarNao('soltagem')" style="padding:10px;">Soltagem</button>
        </div>
        <button onclick="document.getElementById('modalMotivos').style.display='none'" style="margin-top:15px; color:red; border:none; background:none; cursor:pointer;">CANCELAR</button>
    </div>

    <script>
        let dados = JSON.parse(localStorage.getItem('mesa_final_v3')) || { 
            sim: 0, nao: 0, programacao: 0, montagem: 0, variacao: 0, soltagem: 0,
            titulo: "MESA - CORRETO OU ERRADO?", corFundo: "#f0f0f0"
        };
        let historico = [];

        function salvar() {
            localStorage.setItem('mesa_final_v3', JSON.stringify(dados));
            atualizar();
        }

        function atualizar() {
            document.getElementById('s-sim').innerText = dados.sim;
            document.getElementById('s-nao').innerText = dados.nao;
            document.getElementById('s-programacao').innerText = dados.programacao;
            document.getElementById('s-montagem').innerText = dados.montagem;
            document.getElementById('s-variacao').innerText = dados.variacao;
            document.getElementById('s-soltagem').innerText = dados.soltagem;
            document.getElementById('mainDisplayTitle').innerText = dados.titulo;
            document.body.style.backgroundColor = dados.corFundo;

            // Lógica da Barra de Progresso com Degradê
            let total = dados.sim + dados.nao;
            let perc = total === 0 ? 0 : Math.round((dados.sim / total) * 100);
            const bar = document.getElementById('progressBar');
            bar.style.width = perc + "%";
            document.getElementById('percentText').innerText = perc + "%";

            // Muda a cor da barra baseado na porcentagem (Vermelho -> Verde)
            let red = perc < 50 ? 255 : Math.floor(255 - (perc - 50) * 5.1);
            let green = perc > 50 ? 255 : Math.floor(perc * 5.1);
            bar.style.backgroundColor = `rgb(${red}, ${green}, 0)`;
            bar.style.background = `linear-gradient(90deg, rgb(${red}, ${green}, 0), #00ff41)`;
        }

        function votarSim() {
            document.getElementById('soundAcerto').play();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            dados.sim++;
            historico.push('sim');
            salvar();
        }

        function mostrarMotivos() { document.getElementById('modalMotivos').style.display = 'block'; }

        function votarNao(motivo) {
            document.getElementById('soundErro').play();
            document.body.style.animation = "shake 0.2s 2";
            dados.nao++;
            dados[motivo]++;
            historico.push(motivo);
            document.getElementById('modalMotivos').style.display = 'none';
            salvar();
            setTimeout(() => document.body.style.animation = "", 200);
        }

        function undo() {
            let u = historico.pop();
            if(!u) return;
            if(u === 'sim') dados.sim--; else { dados.nao--; dados[u]--; }
            salvar();
        }

        function changeTitle(v) { dados.titulo = v || "MESA - CORRETO OU ERRADO?"; salvar(); }
        function changeBgColor(v) { dados.corFundo = v; salvar(); }
        function fecharAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        // Protocolo 67
        function executar67() {
            const overlay = document.getElementById('videoOverlay');
            const video = document.getElementById('vid67');
            overlay.style.display = 'block';
            video.play();
            video.onended = () => overlay.style.display = 'none';
            // Para sair do vídeo antes de acabar, basta clicar na tela
            overlay.onclick = () => { overlay.style.display = 'none'; video.pause(); };
        }

        function resetarTudo() { if(confirm("REINICIAR SISTEMA?")) { localStorage.clear(); location.reload(); } }

        let s = "";
        document.addEventListener('keydown', (e) => {
            if(e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
            s += e.key.toLowerCase();
            if(s.includes("harryblocks") || s.includes("harry blocks")) {
                document.getElementById('adminPanel').style.display = 'block';
                startMatrix();
                s = "";
            }
        });

        function startMatrix() {
            const canvas = document.getElementById('matrix');
            const ctx = canvas.getContext('2d');
            canvas.width = 450; canvas.height = 400;
            const letters = "01";
            const fontSize = 10;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            setInterval(() => {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0F0";
                for(let i = 0; i < drops.length; i++) {
                    ctx.fillText(letters[Math.floor(Math.random()*2)], i*fontSize, drops[i]*fontSize);
                    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }, 33);
        }

        atualizar();
    </script>
</body>
</html>
