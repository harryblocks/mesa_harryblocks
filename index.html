<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">SISTEMA DE VOTAÇÃO MESA</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            transition: background 0.3s;
        }

        h1 {
            font-family: "Times New Roman", Times, serif;
            text-transform: uppercase;
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .btn-controlz {
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            background-color: #ffc107;
            color: black;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .stats-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
        }

        .main-stats { font-size: 1.3rem; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .sub-stats { font-size: 1rem; color: #555; line-height: 1.6; }

        .voting-area { display: flex; gap: 40px; }

        .vote-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            width: 200px;
        }

        .vote-card:hover { transform: scale(1.05); }
        .vote-card img { width: 150px; height: 150px; object-fit: contain; }
        .vote-card p { font-weight: bold; margin-top: 15px; font-size: 1.2rem; }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 3000;
            text-align: center;
            width: 350px;
        }

        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .modal-buttons button { padding: 12px; border: none; border-radius: 5px; background: #eee; cursor: pointer; font-weight: bold; }

        /* Estilo do Painel Admin */
        #adminPanel { border: 3px solid #333; width: 400px; }
        .admin-option { margin-bottom: 15px; text-align: left; border-top: 1px solid #eee; padding-top: 10px; }
        .admin-option label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .admin-option input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .close-admin { background: #ff4444; color: white; border: none; padding: 8px 15px; float: right; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 id="mainDisplayTitle">MESA - CORRETO OU ERRADO?</h1>

    <button class="btn-controlz" onclick="undo()">↩️ Control Z</button>

    <div class="stats-box">
        <div class="main-stats">
            ✅ Sim: <span id="s-sim">0</span> | ❌ Não: <span id="s-nao">0</span>
        </div>
        <div class="sub-stats">
            Montagem: <span id="s-montagem">0</span> | Programação: <span id="s-programacao">0</span><br>
            Variação: <span id="s-variacao">0</span> | Soltagem: <span id="s-soltagem">0</span>
        </div>
    </div>

    <div class="voting-area">
        <div class="vote-card" onclick="votarSim()">
            <img src="like.png" alt="Correto">
            <p>CORRETO</p>
        </div>
        <div class="vote-card" onclick="mostrarMotivos()">
            <img src="6323-dislikebs.png" alt="Errado">
            <p>ERRADO</p>
        </div>
    </div>

    <div id="modalMotivos" class="modal">
        <img src="2e82eda13b1ad2f508a6651858124034.png" style="width: 100%; border-radius: 10px; margin-bottom: 10px;">
        <h3>QUAL O MOTIVO?</h3>
        <div class="modal-buttons">
            <button onclick="votarNao('programacao')">Programação</button>
            <button onclick="votarNao('montagem')">Montagem</button>
            <button onclick="votarNao('variacao')">Variação</button>
            <button onclick="votarNao('soltagem')">Soltagem</button>
        </div>
        <button onclick="fecharModal()" style="margin-top: 15px; background: none; border: none; color: blue; cursor: pointer;">Cancelar</button>
    </div>

    <div id="adminPanel" class="modal">
        <button class="close-admin" onclick="fecharAdmin()">SAIR</button>
        <img src="hacker options sigma.png" style="width: 60px; margin-top: 10px;">
        <h3>PAINEL HACKER</h3>
        
        <div class="admin-option">
            <label>RENOMEAR PÁGINA:</label>
            <input type="text" id="newTitleInput" placeholder="Digite o novo título..." oninput="changeTitle(this.value)">
        </div>

        <div class="admin-option">
            <label>COR DE FUNDO (HEX):</label>
            <input type="text" id="bgColorInput" placeholder="#f0f0f0" oninput="changeBgColor(this.value)">
        </div>

        <button onclick="resetarTudo()" style="background: black; color: white; width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px;">ZERAR TODOS OS VOTOS</button>
    </div>

    <script>
        // Carregar dados ou iniciar do zero
        let dados = JSON.parse(localStorage.getItem('mesa_dados')) || { 
            sim: 0, nao: 0, programacao: 0, montagem: 0, variacao: 0, soltagem: 0,
            titulo: "MESA - CORRETO OU ERRADO?",
            corFundo: "#f0f0f0"
        };
        
        let historico = [];

        function salvarDados() {
            localStorage.setItem('mesa_dados', JSON.stringify(dados));
            atualizarInterface();
        }

        function atualizarInterface() {
            document.getElementById('s-sim').innerText = dados.sim;
            document.getElementById('s-nao').innerText = dados.nao;
            document.getElementById('s-programacao').innerText = dados.programacao;
            document.getElementById('s-montagem').innerText = dados.montagem;
            document.getElementById('s-variacao').innerText = dados.variacao;
            document.getElementById('s-soltagem').innerText = dados.soltagem;
            
            document.getElementById('mainDisplayTitle').innerText = dados.titulo;
            document.getElementById('pageTitle').innerText = dados.titulo;
            document.body.style.backgroundColor = dados.corFundo;
        }

        function votarSim() {
            dados.sim++;
            historico.push('sim');
            salvarDados();
        }

        function mostrarMotivos() { document.getElementById('modalMotivos').style.display = 'block'; }
        function fecharModal() { document.getElementById('modalMotivos').style.display = 'none'; }

        function votarNao(motivo) {
            dados.nao++;
            dados[motivo]++;
            historico.push(motivo);
            fecharModal();
            salvarDados();
        }

        function undo() {
            let ultimo = historico.pop();
            if (!ultimo) return;
            if (ultimo === 'sim') { dados.sim--; } 
            else { dados.nao--; dados[ultimo]--; }
            salvarDados();
        }

        // Funções do Painel Hacker
        function changeTitle(val) {
            dados.titulo = val || "MESA - CORRETO OU ERRADO?";
            salvarDados();
        }

        function changeBgColor(val) {
            if(val.length >= 4) {
                dados.corFundo = val;
                salvarDados();
            }
        }

        function fecharAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        function resetarTudo() {
            if(confirm("Deseja apagar TUDO?")) {
                localStorage.clear();
                location.reload();
            }
        }

        let segredo = "";
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
            segredo += e.key.toLowerCase();
            if (segredo.includes("harryblocks") || segredo.includes("harry blocks")) {
                document.getElementById('adminPanel').style.display = 'block';
                segredo = "";
            }
            if (segredo.length > 20) segredo = "";
        });

        // Inicializa a tela com os dados salvos
        atualizarInterface();
    </script>
</body>
</html>
