<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE VOTAÇÃO MESA</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
        }

        h1 {
            font-family: "Times New Roman", Times, serif;
            text-transform: uppercase;
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Botão Control Z no topo */
        .top-buttons {
            display: flex;
            margin-bottom: 20px;
        }

        .btn-controlz {
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            background-color: #ffc107;
            color: black;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        /* Quadro de Estatísticas na Tela Principal */
        .stats-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
        }

        .stats-box h2 { font-size: 1.2rem; margin-top: 0; }
        .main-stats { font-size: 1.3rem; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .sub-stats { font-size: 1rem; color: #555; line-height: 1.6; }

        /* Área de Votação */
        .voting-area {
            display: flex;
            gap: 40px;
        }

        .vote-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            width: 200px;
        }

        .vote-card:hover { transform: scale(1.05); }
        .vote-card img { width: 150px; height: 150px; object-fit: contain; }
        .vote-card p { font-weight: bold; margin-top: 15px; font-size: 1.2rem; }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 3000;
            text-align: center;
            width: 350px;
        }

        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .modal-buttons button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #eee;
            cursor: pointer;
            font-weight: bold;
        }

        /* Estilo do Painel Admin Secreto */
        #adminPanel {
            border: 3px solid #333;
        }
        .close-admin {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            float: right;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>MESA - CORRETO OU ERRADO?</h1>

    <div class="top-buttons">
        <button class="btn-controlz" onclick="undo()">↩️ Control Z</button>
    </div>

    <div class="stats-box">
        <h2>Estatísticas</h2>
        <div class="main-stats">
            ✅ Sim: <span id="s-sim">0</span> | ❌ Não: <span id="s-nao">0</span>
        </div>
        <div class="sub-stats">
            Montagem: <span id="s-montagem">0</span> | Programação: <span id="s-programacao">0</span><br>
            Variação: <span id="s-variacao">0</span> | Soltagem: <span id="s-soltagem">0</span>
        </div>
    </div>

    <div class="voting-area">
        <div class="vote-card" onclick="votarSim()">
            <img src="like.png" alt="Correto">
            <p>CORRETO</p>
        </div>

        <div class="vote-card" onclick="mostrarMotivos()">
            <img src="6323-dislikebs.png" alt="Errado">
            <p>ERRADO</p>
        </div>
    </div>

    <div id="modalMotivos" class="modal">
        <img src="2e82eda13b1ad2f508a6651858124034.png" style="width: 100%; border-radius: 10px; margin-bottom: 10px;">
        <h3>QUAL O MOTIVO?</h3>
        <div class="modal-buttons">
            <button onclick="votarNao('programacao')">Programação</button>
            <button onclick="votarNao('montagem')">Montagem</button>
            <button onclick="votarNao('variacao')">Variação</button>
            <button onclick="votarNao('soltagem')">Soltagem</button>
        </div>
        <button onclick="fecharModal()" style="margin-top: 15px; background: none; border: none; color: blue; cursor: pointer;">Cancelar</button>
    </div>

    <div id="adminPanel" class="modal">
        <button class="close-admin" onclick="fecharAdmin()">SAIR</button>
        <img src="hacker options sigma.png" style="width: 70px; margin-top: 20px;">
        <h3>PAINEL HACKER</h3>
        <p>Acesso Restrito ao Administrador</p>
        <button onclick="resetarTudo()" style="background: black; color: white; width: 100%; padding: 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold;">Zerar Banco de Dados</button>
    </div>

    <script>
        let dados = { sim: 0, nao: 0, programacao: 0, montagem: 0, variacao: 0, soltagem: 0 };
        let historico = [];

        function atualizarInterface() {
            document.getElementById('s-sim').innerText = dados.sim;
            document.getElementById('s-nao').innerText = dados.nao;
            document.getElementById('s-programacao').innerText = dados.programacao;
            document.getElementById('s-montagem').innerText = dados.montagem;
            document.getElementById('s-variacao').innerText = dados.variacao;
            document.getElementById('s-soltagem').innerText = dados.soltagem;
        }

        function votarSim() {
            dados.sim++;
            historico.push('sim');
            atualizarInterface();
        }

        function mostrarMotivos() { document.getElementById('modalMotivos').style.display = 'block'; }
        function fecharModal() { document.getElementById('modalMotivos').style.display = 'none'; }

        function votarNao(motivo) {
            dados.nao++;
            dados[motivo]++;
            historico.push(motivo);
            fecharModal();
            atualizarInterface();
        }

        function undo() {
            let ultimo = historico.pop();
            if (!ultimo) return;
            if (ultimo === 'sim') { dados.sim--; } 
            else { dados.nao--; dados[ultimo]--; }
            atualizarInterface();
        }

        function fecharAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        function resetarTudo() {
            if(confirm("Tem certeza que deseja apagar todos os registros permanentemente?")) {
                dados = { sim: 0, nao: 0, programacao: 0, montagem: 0, variacao: 0, soltagem: 0 };
                historico = [];
                atualizarInterface();
                fecharAdmin();
            }
        }

        // Sistema de Segredo
        let segredo = "";
        document.addEventListener('keydown', (e) => {
            // Atalho Ctrl+Z
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }

            // Digitar "harry blocks"
            segredo += e.key.toLowerCase();
            if (segredo.includes("harryblocks") || segredo.includes("harry blocks")) {
                document.getElementById('adminPanel').style.display = 'block';
                segredo = "";
            }
            if (segredo.length > 20) segredo = "";
        });
    </script>
</body>
</html>
