<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM (1993) - DOS.Zone Edition</title>
    <style>
        /* Remove margens e garante que a página ocupe 100% da tela */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Container do jogo para manter a proporção ideal ou ocupar a tela cheia */
        .game-container {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            position: relative;
        }

        /* Configuração do iframe para o emulador */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <iframe 
            src="https://dos.zone/doom-dec-1993/" 
            allow="autoplay; fullscreen; keyboard"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
